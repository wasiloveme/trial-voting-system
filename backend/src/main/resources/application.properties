# =============================================================================
# SECURED SUPER SYSTEM — Spring Boot Application Configuration
# Course:  IAS101 - Information Assurance and Security
# =============================================================================


# =============================================================================
# [A] APPLICATION IDENTITY
# =============================================================================
spring.application.name=secured-super-system
server.port=8443


# =============================================================================
# [B] ENCRYPTION IN TRANSIT — TLS 1.3 / HTTPS
# IAS101 Requirement: All data in transit must be encrypted.
# -----------------------------------------------------------------------------
# HOW TO GENERATE A SELF-SIGNED KEYSTORE FOR DEVELOPMENT:
#
#   Run this ONE command in your terminal from the /backend/src/main/resources
#   directory:
#
#   keytool -genkeypair -alias secured-super-system -keyalg RSA -keysize 2048 \
#     -storetype PKCS12 -keystore keystore.p12 -validity 365 \
#     -dname "CN=localhost, OU=IAS101, O=University, L=Manila, ST=NCR, C=PH"
#
#   It will prompt for a password — set it to match ssl.key-store-password below.
#
# NOTE: For production, replace with a certificate from a trusted CA (e.g.,
#       Let's Encrypt). The properties structure below is identical for both.
# =============================================================================

# Enable SSL/TLS on the embedded Tomcat server
server.ssl.enabled=false

# Path to the PKCS12 keystore file you generated above
server.ssl.key-store=classpath:keystore.p12

# CHANGE THIS — must match the password you used in the keytool command
server.ssl.key-store-password=CHANGE_ME_KEYSTORE_PASSWORD

# Keystore format
server.ssl.key-store-type=PKCS12

# The alias given to the key pair in the keytool command
server.ssl.key-alias=secured-super-system

# [CRITICAL IAS101 REQUIREMENT] — Force TLS 1.3 exclusively.
# Disabling TLS 1.0 and 1.1 removes known vulnerabilities (POODLE, BEAST).
# TLS 1.2 is kept as a fallback for compatibility; remove it for max hardening.
server.ssl.enabled-protocols=TLSv1.3,TLSv1.2

# Restrict to strong cipher suites only (forward secrecy + AES-256-GCM)
server.ssl.ciphers=TLS_AES_256_GCM_SHA384,TLS_AES_128_GCM_SHA256,TLS_CHACHA20_POLY1305_SHA256


# =============================================================================
# [C] POSTGRESQL DATABASE CONNECTION
# IAS101 Requirement: Persistent storage for all 5 subsystems.
# -----------------------------------------------------------------------------
# INSTRUCTIONS: Replace the placeholder values below with your actual
# PostgreSQL credentials before running the application.
# For team development, use environment variables instead of hardcoding:
#   spring.datasource.url=${DB_URL}
#   spring.datasource.username=${DB_USER}
#   spring.datasource.password=${DB_PASSWORD}
# =============================================================================

# Full JDBC connection string — update DB host, port, and database name
spring.datasource.url=jdbc:postgresql://localhost:5432/secured_super_system_db

# PostgreSQL username — CHANGE THIS
spring.datasource.username=postgres

# PostgreSQL password — CHANGE THIS
spring.datasource.password=leapfrog

# Hibernate PostgreSQL dialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver


# =============================================================================
# [D] JPA / HIBERNATE SETTINGS
# =============================================================================

# [CRITICAL IAS101 REQUIREMENT] — Enables Spring Data JPA Auditing.
# This activates @CreatedDate and @LastModifiedDate in BaseAuditEntity,
# which is the engine behind the automated Audit Trail (Subsystem 3).
# Must also be paired with @EnableJpaAuditing on the @Configuration class.
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# DDL Strategy:
#   - 'validate'  — Recommended for production: checks schema but won't alter it.
#   - 'update'    — Recommended for development: auto-creates/alters tables.
#   - 'create'    — Drops and recreates on every start (use for fresh testing only).
# CHANGE TO 'validate' before final submission / demo.
spring.jpa.hibernate.ddl-auto=update

# Shows generated SQL in the console — invaluable for debugging JPA queries.
# Set to 'false' in production to avoid leaking schema details in logs.
spring.jpa.show-sql=true

# Formats the logged SQL for readability during development
spring.jpa.properties.hibernate.format_sql=true

# Suppresses Hibernate startup banner noise in logs
spring.jpa.open-in-view=false


# =============================================================================
# [E] ENCRYPTION AT REST — AES-256 Key
# IAS101 Requirement: PII fields (Address, Contact Number) must be
# encrypted at rest using AES-256 via AttributeConverter.
# -----------------------------------------------------------------------------
# SECURITY RULE: NEVER commit a real key to Git.
# In production, inject this via environment variable:
#   app.security.aes-secret-key=${AES_SECRET_KEY}
#
# KEY GENERATION — Run this in your terminal to get a valid 256-bit key:
#   openssl rand -base64 32
#
# Paste the output below during development ONLY.
# =============================================================================
app.security.aes-secret-key=v9y/B?E(H+MbQeThWmZq4t7w!z%C&F)J


# =============================================================================
# [F] JWT CONFIGURATION
# IAS101 Requirement: Stateless authentication with role-stamped tokens.
# -----------------------------------------------------------------------------
# SECURITY RULE: Use a long, random, Base64-encoded string (min 256 bits).
# Generate with: openssl rand -base64 64
# =============================================================================

# The HMAC-SHA256 signing secret for JWT tokens
app.security.jwt-secret=v9y/B?E(H+MbQeThWmZq4t7w!z%C&F)J

# Token validity window in milliseconds
# 86400000 ms = 24 hours
app.security.jwt-expiration-ms=86400000


# =============================================================================
# [G] OTP / NOTIFICATION ENGINE — JavaMailSender
# IAS101 Requirement: OTP dispatch for 2FA Registration and Password Reset.
# -----------------------------------------------------------------------------
# Configure to use a real Gmail account (enable App Password in Google Account
# settings — do NOT use your main Gmail password here).
# =============================================================================

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=decena.arwinjosh.lictaoa@gmail.com
spring.mail.password=main123

# STARTTLS — encrypts the SMTP connection
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true


# =============================================================================
# [H] VPN / IP WHITELIST (Simulated VPN Filter)
# IAS101 Requirement: Admin endpoints (/api/admin/**) are accessible ONLY
# from whitelisted IP addresses, simulating a VPN perimeter.
# -----------------------------------------------------------------------------
# Add comma-separated IPs of approved admin machines/VPN exit nodes.
# 127.0.0.1 = localhost for local development testing.
# =============================================================================
app.security.admin-ip-whitelist=127.0.0.1,::1


# =============================================================================
# [I] LOGGING
# Keep security-relevant log levels explicit for the professor review.
# =============================================================================

# Show Spring Security authorization decisions in console (dev only)
logging.level.org.springframework.security=DEBUG

# Show Hibernate SQL binding parameters (dev only — remove for production)
logging.level.org.hibernate.type.descriptor.sql=TRACE

# Application-level logging
logging.level.com.votingsystem=DEBUG
